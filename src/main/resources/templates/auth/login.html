<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:divth="http://www.w3.org/1999/html">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h4 class="mb-3 text-center">Đăng nhập hệ thống</h4>
                    <p class="text-secondary text-center mb-4">Chào mừng bạn quay lại.</p>

                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${param.logout}" class="alert alert-info">Bạn đã đăng xuất thành công.</div>
                    <!--                    <div th:if="${loginGlobalError}" class="alert alert-danger" th:text="${loginGlobalError}"></div>-->

                    <div th:if="${param.error}" class="alert alert-danger">Tên đăng nhập không đúng</div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form th:action="@{/auth/login-validate}" th:object="${loginDTO}" method="post" class="vstack gap-3" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div>
                            <label class="form-label" for="login-username">Tên đăng nhập</label>
                            <input id="login-username" type="text" th:field="*{username}" class="form-control"
                                   th:classappend="${#fields.hasErrors('username') or loginUsernameError != null} ? ' is-invalid'"
                                   placeholder="Nhập tên đăng nhập" autocomplete="username">
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                            <div class="invalid-feedback d-block"
                                 th:if="${loginUsernameError != null and !#fields.hasErrors('username')}"
                                 th:text="${loginUsernameError}"></div>
                        </div>
                        <div>
                            <label class="form-label" for="login-password">Mật khẩu</label>
                            <input id="login-password" type="password" th:field="*{password}" class="form-control"
                                   th:classappend="${#fields.hasErrors('password') or loginPasswordError != null} ? ' is-invalid'"
                                   placeholder="Nhập mật khẩu" autocomplete="current-password">
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            <div class="invalid-feedback d-block"
                                 th:if="${loginPasswordError != null and !#fields.hasErrors('password')}"
                                 th:text="${loginPasswordError}"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                    </form>

                    <p class="text-center mt-4 mb-0">Chưa có tài khoản? <a th:href="@{/auth/register}">Đăng ký ngay</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

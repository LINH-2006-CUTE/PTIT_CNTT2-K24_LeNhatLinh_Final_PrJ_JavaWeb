<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h4 class="text-center mb-4">Tạo tài khoản mới</h4>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form th:action="@{/auth/register}" th:object="${registerDTO}" method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="col-12">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" th:field="*{fullName}" class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{fullName}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Tên đăng nhập</label>
                            <input type="text" th:field="*{username}" class="form-control" th:classappend="${#fields.hasErrors('username')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{username}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Vai trò</label>
                            <select th:field="*{role}" class="form-select" th:classappend="${#fields.hasErrors('role')} ? ' is-invalid'" onchange="toggleRoleDepartmentFields(this.value)">
                                <option value="">-- Chọn vai trò --</option>
                                <option th:each="role : ${roles}" th:value="${role}"
                                        th:text="${role == T(com.btvn.projectfinal.model.entity.User.Role).STUDENT ? 'Sinh viên' : 'Giảng viên'}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{role}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" th:field="*{password}" class="form-control" th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Xác nhận mật khẩu</label>
                            <input type="password" th:field="*{confirmPassword}" class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                        </div>

                        <div class="col-12" id="roleDepartmentFields" style="display:none;">
                            <label class="form-label">Khoa/Ngành</label>
                            <p class="small text-secondary mb-1">Sinh viên: nên chọn khoa. Giảng viên: chọn khoa giảng dạy (nếu bỏ trống hệ thống dùng khoa mặc định).</p>
                            <select th:field="*{departmentId}" class="form-select">
                                <option value="">-- Chọn Khoa/Ngành (tuỳ chọn với GV) --</option>
                                <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                            </select>
                        </div>

                        <div class="col-12 d-grid">
                            <button type="submit" class="btn btn-success">Đăng ký</button>
                        </div>
                    </form>

                    <p class="text-center mt-3 mb-0">Đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function toggleRoleDepartmentFields(role) {
        const fields = document.getElementById('roleDepartmentFields');
        fields.style.display = (role === 'STUDENT' || role === 'LECTURER') ? 'block' : 'none';
    }
    window.onload = function () {
        const roleSelect = document.querySelector('select[name="role"]');
        if (roleSelect) toggleRoleDepartmentFields(roleSelect.value);
    };
</script>
</body>
</html>

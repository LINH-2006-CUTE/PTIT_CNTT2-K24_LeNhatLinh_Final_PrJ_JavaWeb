<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đặt lịch cố vấn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h4 class="mb-3">Đặt lịch cố vấn học tập</h4>
                    <p class="text-secondary">Thực hiện theo thứ tự: chọn khoa/ngành, chọn giảng viên, chọn thời gian.</p>

                    <form th:action="@{/student/appointments/new}" method="get" class="mb-4">
                        <label class="form-label">Khoa/Ngành</label>
                        <select class="form-select" name="departmentId" onchange="this.form.submit()">
                            <option value="">-- Chọn Khoa/Ngành --</option>
                            <option th:each="dept : ${departments}"
                                    th:value="${dept.id}"
                                    th:text="${dept.name}"
                                    th:selected="${selectedDeptId != null and dept.id == selectedDeptId}"></option>
                        </select>
                    </form>

                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form th:if="${selectedDeptId != null}" th:action="@{/student/appointments/save}" method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="departmentId" th:value="${selectedDeptId}">

                        <div class="col-12">
                            <label class="form-label">Giảng viên</label>
                            <select class="form-select" name="lecturerId" required>
                                <option value="">-- Chọn giảng viên --</option>
                                <option th:each="l : ${lecturers}" th:value="${l.id}"
                                        th:text="${l.user.profile != null ? l.user.profile.fullName : 'Chưa cập nhật tên'}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Ngày</label>
                            <input type="date" class="form-control" name="appointmentDate" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Từ giờ</label>
                            <input type="time" class="form-control" name="startTime" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Đến giờ</label>
                            <input type="time" class="form-control" name="endTime" required>
                        </div>
                        <div class="col-12 d-grid gap-2 d-md-flex justify-content-md-end mt-2">
                            <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-success">Xác nhận đặt lịch</button>
                        </div>
                    </form>

                    <div th:if="${selectedDeptId == null}" class="alert alert-info mt-3 mb-0">
                        Vui lòng chọn khoa/ngành trước để tải danh sách giảng viên.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

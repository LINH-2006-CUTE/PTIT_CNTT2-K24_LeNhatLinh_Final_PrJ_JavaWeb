<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt lịch cố vấn</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h4><i class="fas fa-calendar-alt"></i> Đăng ký lịch cố vấn học tập</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/student/appointments/save}" method="post">
                <div class="form-group">
                    <label>Chọn Khoa/Ngành:</label>
                    <select class="form-control" name="departmentId"
                            onchange="window.location.href='/student/appointments/new?departmentId=' + this.value">
                        <option value="">-- Chọn Khoa --</option>
                        <option th:each="dept : ${departments}"
                                th:value="${dept.id}"
                                th:text="${dept.name}"
                                th:selected="${dept.id == selectedDeptId}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Chọn Giảng viên cố vấn:</label>
                    <select class="form-control" name="lecturerId" required>
                        <option value="">-- Chọn Giảng viên --</option>
                        <option th:each="l : ${lecturers}"
                                th:value="${l.id}"
                                th:text="${l.user.profile.fullName}"></option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <label>Ngày hẹn:</label>
                        <input type="date" class="form-control" name="appointmentDate" required>
                    </div>
                    <div class="col-md-3">
                        <label>Từ giờ:</label>
                        <input type="time" class="form-control" name="startTime" required>
                    </div>
                    <div class="col-md-3">
                        <label>Đến giờ:</label>
                        <input type="time" class="form-control" name="endTime" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-success mt-4 w-100">Xác nhận đặt lịch</button>
                <a th:href="@{/dashboard}" class="btn btn-secondary mt-2 w-100">Quay lại</a>
            </form>
            <div th:if="${message}" class="alert alert-success">
                <p th:text="${message}"></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lịch hẹn của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Lịch hẹn cố vấn của tôi</h4>
        <a th:href="@{/student/appointments/new}" class="btn btn-success">Đặt lịch mới</a>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Ngày</th>
                    <th>Giảng viên</th>
                    <th>Khung giờ</th>
                    <th>Trạng thái</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ap : ${appointments}"
                    th:with="startAt=${T(java.time.LocalDateTime).of(ap.appointmentDate, ap.startTime)},
                             awaiting=${ap.status == 'Pending' or ap.status == 'Chờ xác nhận' or ap.status == 'Đã xác nhận'}">
                    <td th:text="${ap.appointmentDate}"></td>
                    <td th:text="${ap.lecturer.user.profile != null ? ap.lecturer.user.profile.fullName : 'Chưa cập nhật'}"></td>
                    <td th:text="${ap.startTime + ' - ' + ap.endTime}"></td>
                    <td>
                        <th:block th:switch="${ap.status}">
                            <span th:case="'Pending'">Chờ hoàn thành</span>
                            <span th:case="'Chờ xác nhận'">Chờ hoàn thành</span>
                            <span th:case="'Đã xác nhận'">Chờ hoàn thành</span>
                            <span th:case="'Completed'">Đã hoàn thành</span>
                            <span th:case="'Cancelled'">Đã hủy</span>
                            <span th:case="*" th:text="${ap.status}">—</span>
                        </th:block>
                    </td>
                    <td class="text-end">
                        <form th:if="${awaiting and !startAt.isBefore(now.plusHours(24))}"
                              th:action="@{/student/appointments/{id}/cancel(id=${ap.id})}"
                              method="post"
                              class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                    onclick="return confirm('Bạn có chắc muốn hủy lịch này?');">
                                Hủy lịch
                            </button>
                        </form>
                        <span th:if="${awaiting and startAt.isBefore(now.plusHours(24))}"
                              class="text-secondary small">
                            Không thể hủy (sát giờ hẹn)
                        </span>
                    </td>
                </tr>
                <tr th:if="${appointments == null || appointments.isEmpty()}">
                    <td colspan="5" class="text-center text-secondary py-4">Bạn chưa có lịch hẹn nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <a th:href="@{/dashboard}" class="btn btn-outline-secondary mt-3">Quay lại</a>
</div>
</body>
</html>

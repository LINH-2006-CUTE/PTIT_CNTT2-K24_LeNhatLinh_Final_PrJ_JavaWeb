<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lịch hẹn của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Lịch hẹn cố vấn của tôi</h4>
        <a th:href="@{/student/appointments/new}" class="btn btn-success">Đặt lịch mới</a>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Ngày</th>
                    <th>Giảng viên</th>
                    <th>Khung giờ</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ap : ${appointments}">
                    <td th:text="${ap.appointmentDate}"></td>
                    <td th:text="${ap.lecturer.user.profile != null ? ap.lecturer.user.profile.fullName : 'Chưa cập nhật'}"></td>
                    <td th:text="${ap.startTime + ' - ' + ap.endTime}"></td>
                </tr>
                <tr th:if="${appointments == null || appointments.isEmpty()}">
                    <td colspan="3" class="text-center text-secondary py-4">Bạn chưa có lịch hẹn nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <a th:href="@{/dashboard}" class="btn btn-outline-secondary mt-3">Quay lại</a>
</div>
</body>
</html>

<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phiếu mượn của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h4 class="mb-3">Phiếu mượn thiết bị</h4>

<!--    <div class="alert alert-info">-->
<!--        <strong>Bạn không tự tạo phiếu ở đây.</strong> Luồng đúng là:-->
<!--        <ol class="mb-0 mt-2">-->
<!--            <li>Bạn <a th:href="@{/student/appointments/new}">đặt lịch cố vấn</a> và tham gia buổi cố vấn.</li>-->
<!--            <li>Sau buổi cố vấn, <strong>giảng viên</strong> nhập đánh giá và chọn thiết bị bạn cần mượn.</li>-->
<!--            <li>Hệ thống tạo phiếu ở trạng thái <em>Chờ cấp phát</em>; khi <strong>thủ kho/Admin</strong> xác nhận xuất kho, trạng thái chuyển thành <em>Đã cấp phát</em>.</li>-->
<!--        </ol>-->
<!--    </div>-->

    <div th:each="rec : ${records}" class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <div class="d-flex flex-wrap justify-content-between gap-2 mb-2">
                <strong>Phiếu #<span th:text="${rec.id}"></span></strong>
                <span class="badge"
                      th:classappend="${rec.status == 'Đã cấp phát'} ? ' bg-success' : ' bg-warning text-dark'"
                      th:text="${rec.status}"></span>
            </div>
            <p class="small text-secondary mb-2">
                Buổi tư vấn #<span th:text="${rec.mentoringSession.id}"></span>
                · Tạo lúc <span th:text="${rec.createdAt}"></span>
            </p>
            <table class="table table-sm mb-0">
                <thead><tr><th>Thiết bị</th><th>Số lượng</th></tr></thead>
                <tbody>
                <tr th:each="line : ${rec.details}">
                    <td th:text="${line.equipment.name}"></td>
                    <td th:text="${line.quantity}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <p th:if="${records == null || records.isEmpty()}" class="text-secondary">
        Bạn chưa có phiếu mượn nào. Hãy hoàn tất buổi cố vấn và chờ giảng viên chỉ định thiết bị.
    </p>

    <a th:href="@{/dashboard}" class="btn btn-outline-secondary mt-2">Quay lại</a>
</div>
</body>
</html>

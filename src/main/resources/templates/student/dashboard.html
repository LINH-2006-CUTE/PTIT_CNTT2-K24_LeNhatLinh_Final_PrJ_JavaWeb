<!doctype html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Student Dashboard</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<div class="container pt-4">
    <nav class="navbar navbar-dark bg-primary px-3">
        <span class="navbar-brand">Trang Sinh viên</span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white" sec:authentication="name"></span>
            <form th:action="@{/auth/logout}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <h5>Xin chào, Sinh viên!</h5>
        <div class="row mt-3">
            <div class="col-md-4">
                <div class="card text-white bg-primary shadow">
                    <div class="card-body">
                        <h6 class="card-title"><i class="fas fa-user-circle"></i> Hồ sơ cá nhân</h6>
                        <p class="small">Cập nhật thông tin sinh viên và khoa ngành.</p>
                        <a th:href="@{/profile}" class="btn btn-light btn-sm">Xem hồ sơ</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-white bg-success shadow">
                    <div class="card-body">
                        <h6 class="card-title"><i class="fas fa-calendar-check"></i> Đặt lịch cố vấn</h6>
                        <p class="small">Chọn giảng viên và khung giờ để nhận tư vấn.</p>
                        <a th:href="@{/student/appointments/new}" class="btn btn-light btn-sm">Đặt lịch ngay</a>
                    </div>
                </div>
            </div>

<!--            <div class="col-md-4">-->
<!--                <div class="card text-white bg-info shadow">-->
<!--                    <div class="card-body">-->
<!--                        <h6 class="card-title"><i class="fas fa-history"></i> Lịch sử học thuật</h6>-->
<!--                        <p class="small">Xem lại các buổi tư vấn và kết quả đánh giá.</p>-->
<!--                        <a th:href="@{/student/history}" class="btn btn-light btn-sm">Xem lịch sử</a>-->
<!--                    </div>-->
<!--                </div>-->
<!--            </div>-->
        </div>

</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>

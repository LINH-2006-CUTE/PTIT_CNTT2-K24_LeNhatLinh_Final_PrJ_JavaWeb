<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hồ sơ học thuật</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h4 class="mb-3">Tra cứu hồ sơ học thuật</h4>
    <p class="text-secondary">
        Sinh viên: <span th:text="${student.username}" class="fw-semibold"></span>
        — Lịch sử buổi tư vấn, đánh giá và thiết bị đã mượn (theo dữ liệu trong hệ thống).
    </p>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Ngày tư vấn</th>
                    <th>Giảng viên</th>
                    <th>Nội dung đánh giá</th>
                    <th>Thiết bị đã mượn</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${historyRows}">
                    <td th:text="${row.consultationDate}"></td>
                    <td th:text="${row.lecturerName}"></td>
                    <td th:text="${row.evaluationContent != null ? row.evaluationContent : '—'}"></td>
                    <td th:text="${row.borrowedEquipmentList != null ? row.borrowedEquipmentList : '—'}"></td>
                </tr>
                <tr th:if="${historyRows == null || historyRows.isEmpty()}">
                    <td colspan="4" class="text-center text-secondary py-4">Chưa có dữ liệu buổi tư vấn.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <a th:href="@{/dashboard}" class="btn btn-outline-secondary mt-3">Quay lại</a>
</div>
</body>
</html>

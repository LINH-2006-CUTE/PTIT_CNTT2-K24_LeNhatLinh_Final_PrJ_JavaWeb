<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trang giảng viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <span class="navbar-brand fw-semibold">Cổng giảng viên</span>
        <div class="d-flex align-items-center gap-2">
            <span class="text-secondary" sec:authentication="name"></span>
            <form th:action="@{/auth/logout}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-danger btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h4 class="mb-4">Xin chào giảng viên</h4>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Hồ sơ cá nhân</h5>
            <p class="text-secondary">Cập nhật thông tin cá nhân và chuyên môn giảng dạy.</p>
            <a th:href="@{/profile}" class="btn btn-success">Xem hồ sơ</a>
        </div>
    </div>
</div>
</body>
</html>

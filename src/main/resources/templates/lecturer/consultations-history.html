<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lịch sử tư vấn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom mb-3">
    <div class="container">
        <span class="navbar-brand fw-semibold">Cổng giảng viên</span>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <a th:href="@{/lecturer/dashboardLecture}" class="btn btn-outline-secondary btn-sm">Dashboard</a>
            <a th:href="@{/lecturer/consultations/pending}" class="btn btn-outline-primary btn-sm">Chờ xử lý</a>
            <a th:href="@{/lecturer/consultations/history}" class="btn btn-outline-primary btn-sm">Lịch sử</a>
            <span class="text-secondary small" sec:authentication="name"></span>
            <form th:action="@{/auth/logout}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-danger btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-2 pb-5">
    <h4 class="mb-3">Lịch sử tư vấn đã hoàn thành</h4>
    <p class="text-secondary">
        Hiển thị <span th:text="${historyPage.numberOfElements}">0</span> /
        <span th:text="${historyPage.totalElements}">0</span> bản ghi (phân trang giúp trang web nhẹ khi có hàng trăm ca).
    </p>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Sinh viên</th>
                    <th>Ngày</th>
                    <th>Giờ</th>
                    <th>Nội dung đánh giá</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${historyPage.content}">
                    <td th:text="${row.studentName}"></td>
                    <td th:text="${row.appointmentDate}"></td>
                    <td th:text="${row.startTime + ' - ' + row.endTime}"></td>
                    <td th:text="${row.evaluationContent != null ? row.evaluationContent : '—'}"></td>
                </tr>
                <tr th:if="${historyPage.isEmpty()}">
                    <td colspan="4" class="text-center text-secondary py-4">Chưa có lịch sử đã hoàn thành.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${historyPage.totalPages > 1}" class="mt-3" aria-label="Phân trang">
        <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${historyPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/lecturer/consultations/history(page=${historyPage.number - 1}, size=${historyPage.size})}">Trước</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="'Trang ' + (${historyPage.number} + 1) + ' / ' + ${historyPage.totalPages}">Trang</span>
            </li>
            <li class="page-item" th:classappend="${historyPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/lecturer/consultations/history(page=${historyPage.number + 1}, size=${historyPage.size})}">Sau</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>

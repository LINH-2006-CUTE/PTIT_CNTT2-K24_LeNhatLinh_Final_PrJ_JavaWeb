<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ca tư vấn chờ xử lý</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom mb-3">
    <div class="container">
        <span class="navbar-brand fw-semibold">Cổng giảng viên</span>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <a th:href="@{/lecturer/dashboardLecture}" class="btn btn-outline-secondary btn-sm">Dashboard</a>
            <a th:href="@{/lecturer/consultations/pending}" class="btn btn-outline-primary btn-sm">Chờ xử lý</a>
            <a th:href="@{/lecturer/consultations/history}" class="btn btn-outline-primary btn-sm">Lịch sử</a>
            <span class="text-secondary small" sec:authentication="name"></span>
            <form th:action="@{/auth/logout}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-danger btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-2 pb-5">
    <h4 class="mb-3">Danh sách ca tư vấn chờ (Pending)</h4>


    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Ngày</th>
                    <th>Khung giờ</th>
                    <th>Sinh viên</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${sessions}">
                    <td th:text="${s.appointmentDate}"></td>
                    <td th:text="${s.startTime + ' - ' + s.endTime}"></td>
                    <td th:text="${s.student.profile != null ? s.student.profile.fullName : s.student.username}"></td>
                    <td class="text-end">
                        <a class="btn btn-success btn-sm"
                           th:href="@{/lecturer/consultations/{id}/evaluate(id=${s.id})}">Nhập đánh giá</a>
                    </td>
                </tr>
                <tr th:if="${sessions == null || sessions.isEmpty()}">
                    <td colspan="4" class="text-center text-secondary py-4">Hiện không có ca nào chờ xử lý.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>

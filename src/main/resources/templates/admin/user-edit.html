<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sửa tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h4 class="mb-3">Sửa tài khoản</h4>
                    <p class="text-secondary small">
                        Đang sửa: <strong th:text="${editUser.username}"></strong>
                        (<span th:text="${editUser.role}"></span>)
                        <span th:if="${editUser.id == currentAdminId}" class="text-danger">— Không nên tự sửa chính mình tại đây.</span>
                    </p>

                    <form th:action="@{/admin/users/{id}/edit(id=${editUser.id})}"
                          th:object="${adminUserEditDTO}" method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="from" th:value="${from}">

                        <div class="col-12">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" th:field="*{fullName}" th:classappend="${#fields.hasErrors('fullName')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{fullName}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" class="form-control" th:field="*{phone}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Giới tính</label>
                            <input type="text" class="form-control" th:field="*{gender}" placeholder="MALE / FEMALE / OTHER">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Địa chỉ</label>
                            <input type="text" class="form-control" th:field="*{address}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Khoa / Ngành (hồ sơ)</label>
                            <select class="form-select" th:field="*{departmentId}">
                                <option value="">— Không chọn —</option>
                                <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Mật khẩu mới</label>
                            <input type="password" class="form-control" th:field="*{newPassword}" autocomplete="new-password" placeholder="Để trống nếu không đổi">
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="enabled" value="true" id="enabled"
                                       th:checked="*{enabled}">
                                <label class="form-check-label" for="enabled">Tài khoản được phép đăng nhập</label>
                            </div>
                        </div>
                        <div class="col-12 d-flex gap-2 justify-content-between">
                            <a th:href="@{/admin/profile/{f}(f=${from})}" class="btn btn-outline-secondary">Quay lại danh sách</a>
                            <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

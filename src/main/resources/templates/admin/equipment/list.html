<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý thiết bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Danh sách thiết bị (CORE-04)</h4>
        <div class="d-flex flex-wrap gap-2">
            <a th:href="@{/admin/reference}" class="btn btn-outline-secondary btn-sm">Xem khoa &amp; loại phòng</a>
            <a th:href="@{/admin/equipment/add}" class="btn btn-success">Thêm thiết bị</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/admin/equipment}" method="get" class="row g-2 mb-3">
        <div class="col-md-8">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm theo tên thiết bị...">
        </div>
        <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-primary">Tìm kiếm</button>
        </div>
        <div class="col-md-2 d-grid">
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">Dashboard</a>
        </div>
    </form>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 small">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Tên</th>
                    <th>Khoa</th>
                    <th>Loại phòng</th>
                    <th>Tồn kho</th>
                    <th>Đơn vị</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item, stat : ${equipmentPage.content}">
                    <td th:text="${stat.index + 1 + equipmentPage.number * equipmentPage.size}"></td>
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.department != null ? item.department.name : '—'}"></td>
                    <td th:text="${item.labRoomType != null ? item.labRoomType.name : '—'}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.unit}"></td>
                    <td>
                        <span class="badge text-bg-success" th:if="${item.status.name() == 'AVAILABLE'}">Khả dụng</span>
                        <span class="badge text-bg-secondary" th:if="${item.status.name() == 'UNAVAILABLE'}">Ngưng</span>
                    </td>
                    <td class="d-flex flex-wrap gap-1">
                        <a th:href="@{/admin/equipment/edit/{id}(id=${item.id})}" class="btn btn-sm btn-warning">Sửa</a>
                        <form th:action="@{/admin/equipment/delete/{id}(id=${item.id})}" method="post" onsubmit="return confirm('Xác nhận xóa thiết bị này?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-danger">Xóa</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${equipmentPage.isEmpty()}">
                    <td colspan="8" class="text-center text-secondary py-4">Không có thiết bị.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-3" th:if="${equipmentPage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:each="i : ${#numbers.sequence(0, equipmentPage.totalPages - 1)}"
                th:classappend="${i == currentPage} ? ' active'">
                <a class="page-link" th:href="@{/admin/equipment(page=${i}, keyword=${keyword})}" th:text="${i + 1}"></a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>

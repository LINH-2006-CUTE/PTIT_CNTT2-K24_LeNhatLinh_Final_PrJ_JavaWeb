<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${equipmentDTO.id != null} ? 'Sửa thiết bị' : 'Thêm thiết bị'">Thiết bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h4 class="mb-4" th:text="${equipmentDTO.id != null} ? 'Cập nhật thiết bị' : 'Thêm thiết bị mới'"></h4>
                    <form th:action="@{/admin/equipment/save}" th:object="${equipmentDTO}" method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" th:field="*{id}">

                        <div class="col-12">
                            <label class="form-label">Tên thiết bị</label>
                            <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Mô tả</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số lượng</label>
                            <input type="number" min="0" th:field="*{quantity}" class="form-control" th:classappend="${#fields.hasErrors('quantity')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{quantity}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Đơn vị</label>
                            <input type="text" th:field="*{unit}" class="form-control" th:classappend="${#fields.hasErrors('unit')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{unit}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Trạng thái</label>
                            <select th:field="*{status}" class="form-select">
                                <option th:each="s : ${statuses}" th:value="${s}"
                                        th:text="${s == T(com.btvn.projectfinal.model.entity.Equipment.EquipmentStatus).AVAILABLE ? 'Còn' : 'Trống'}"></option>
                            </select>
                        </div>
                        <div class="col-12 d-flex gap-2 justify-content-end">
                            <a th:href="@{/admin/equipment}" class="btn btn-outline-secondary">Hủy</a>
                            <button type="submit" class="btn btn-primary">Lưu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

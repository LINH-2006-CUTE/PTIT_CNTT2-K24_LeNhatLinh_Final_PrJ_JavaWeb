<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Danh sách hồ sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0" th:text="${title}"></h4>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">Quay lại</a>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Họ tên</th>
                    <th>Số điện thoại</th>
                    <th>Địa chỉ</th>
                    <th>Giới tính</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${users}">
                    <td th:text="${p.fullName}"></td>
                    <td th:text="${p.phone}"></td>
                    <td th:text="${p.address}"></td>
                    <td th:text="${p.gender}"></td>
                </tr>
                <tr th:if="${users == null || users.isEmpty()}">
                    <td colspan="4" class="text-center text-secondary py-4">Không có dữ liệu.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>

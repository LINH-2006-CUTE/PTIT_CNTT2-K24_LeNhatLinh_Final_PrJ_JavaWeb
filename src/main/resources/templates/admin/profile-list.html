<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Danh sách hồ sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h4 class="mb-0" th:text="${title}"></h4>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">Quay lại</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

<!--    <div class="alert alert-warning small" th:if="${listFrom == 'students' or listFrom == 'lecturers'}">-->
<!--        <strong>Xóa tài khoản</strong> sẽ gỡ luôn lịch cố vấn, đánh giá, phiếu mượn liên quan trong hệ thống. Thao tác không hoàn tác.-->
<!--    </div>-->

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th>Tên đăng nhập</th>
                    <th>Họ tên</th>
                    <th>Số điện thoại</th>
                    <th>Địa chỉ</th>
                    <th>Giới tính</th>
                    <th>Trạng thái</th>
                    <th class="text-end">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${users}">
                    <td th:text="${p.user.username}"></td>
                    <td th:text="${p.fullName}"></td>
                    <td th:text="${p.phone}"></td>
                    <td th:text="${p.address}"></td>
                    <td th:text="${p.gender}"></td>
                    <td>
                        <span class="badge bg-success" th:if="${p.user.enabled}">Đang bật</span>
                        <span class="badge bg-secondary" th:unless="${p.user.enabled}">Đã khóa</span>
                    </td>
                    <td class="text-end text-nowrap">
                        <a class="btn btn-sm btn-warning"
                           th:href="@{/admin/users/{id}/edit(id=${p.user.id}, from=${listFrom})}">Sửa</a>
                        <form class="d-inline"
                              th:action="@{/admin/users/{id}/delete(id=${p.user.id})}"
                              method="post"
                              th:attr="onsubmit=|return confirm('Xóa vĩnh viễn tài khoản ${p.user.username}?');|">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="from" th:value="${listFrom}">
                            <button type="submit" class="btn btn-sm btn-danger">Xóa</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${users == null || users.isEmpty()}">
                    <td colspan="7" class="text-center text-secondary py-4">Không có dữ liệu.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>

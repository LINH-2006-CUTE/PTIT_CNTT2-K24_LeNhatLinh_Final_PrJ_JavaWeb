<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phiếu mượn chờ cấp phát</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-dark navbar-dark mb-3">
    <div class="container">
        <span class="navbar-brand">Admin</span>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a>
            <span class="text-white-50 small align-self-center" sec:authentication="name"></span>
            <form th:action="@{/auth/logout}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-2 pb-5">
    <h4 class="mb-3">Xác nhận cấp phát thiết bị (CORE-08)</h4>
    <p class="text-secondary">Phiếu do giảng viên tạo sau buổi cố vấn. Kiểm tra tồn kho trước khi bấm xác nhận — nếu thiếu hàng, toàn bộ thao tác sẽ bị hủy.</p>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div th:each="rec : ${records}" class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white d-flex flex-wrap justify-content-between align-items-center gap-2">
            <div>
                <strong>Phiếu #<span th:text="${rec.id}"></span></strong>
                <span class="text-secondary">—</span>
                <span th:text="${rec.student.profile != null ? rec.student.profile.fullName : rec.student.username}">SV</span>
            </div>
            <div class="small text-secondary">
                Buổi tư vấn #<span th:text="${rec.mentoringSession.id}"></span>
                · <span th:text="${rec.createdAt}"></span>
            </div>
        </div>
        <div class="card-body">
            <p class="mb-2"><span class="badge bg-warning text-dark" th:text="${rec.status}"></span></p>
            <table class="table table-sm mb-3">
                <thead>
                <tr>
                    <th>Thiết bị</th>
                    <th>Số lượng xin</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="line : ${rec.details}">
                    <td th:text="${line.equipment.name}"></td>
                    <td th:text="${line.quantity}"></td>
                </tr>
                </tbody>
            </table>
            <form th:action="@{/admin/borrowing/{id}/confirm(id=${rec.id})}" method="post" class="d-inline"
                  onsubmit="this.querySelector('button').disabled=true; return confirm('Xác nhận đã xuất kho và trừ tồn?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-success">Xác nhận xuất kho</button>
            </form>
        </div>
    </div>

    <div th:if="${records == null || records.isEmpty()}" class="alert alert-info">
        Không có phiếu nào đang chờ cấp phát.
    </div>
</div>
</body>
</html>

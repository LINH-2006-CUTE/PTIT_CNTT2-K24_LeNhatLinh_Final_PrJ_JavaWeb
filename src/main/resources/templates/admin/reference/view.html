<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dữ liệu nền (chỉ xem)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-dark navbar-dark mb-3">
    <div class="container">
        <span class="navbar-brand">Admin — Dữ liệu nền</span>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a>
            <span class="text-white-50 small align-self-center" sec:authentication="name"></span>
            <form th:action="@{/auth/logout}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-2 pb-5">
    <div class="alert alert-info">
        <strong>Chỉ xem.</strong> Khoa/ngành và loại phòng lab được seed từ hệ thống — không thêm/xóa tại đây để tránh phá vỡ liên kết dữ liệu (thiết bị, lịch, …).
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header">Khoa / Ngành</div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr><th>Mã</th><th>Tên</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="d : ${departments}">
                            <td th:text="${d.code}"></td>
                            <td th:text="${d.name}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header">Loại phòng Lab</div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr><th>Tên</th><th>Mô tả</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="t : ${labRoomTypes}">
                            <td th:text="${t.name}"></td>
                            <td th:text="${t.description}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cập nhật hồ sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">Hồ sơ cá nhân</h4>
                        <a th:href="@{/dashboard}" class="btn btn-outline-secondary btn-sm">Quay lại</a>
                    </div>
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

                    <form th:action="@{/profile}" th:object="${profileDTO}" method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="col-md-6">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" th:field="*{fullName}" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" th:field="*{phone}" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Địa chỉ</label>
                            <input type="text" th:field="*{address}" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Giới tính</label>
                            <select th:field="*{gender}" class="form-select">
                                <option value="">-- Chọn --</option>
                                <option value="MALE">Nam</option>
                                <option value="FEMALE">Nữ</option>
                                <option value="OTHER">Khác</option>
                            </select>
                        </div>

                        <div class="col-md-6" th:if="${profile.user.role.name() == 'STUDENT'}">
                            <label class="form-label">Khoa/Ngành</label>
                            <select th:field="*{departmentId}" class="form-select">
                                <option value="">-- Chọn Khoa --</option>
                                <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                            </select>
                        </div>

                        <div class="col-md-6" th:if="${profile.user.role.name() == 'LECTURER'}">
                            <label class="form-label">Học hàm/Học vị</label>
                            <select th:field="*{academicRank}" class="form-select">
                                <option value="">-- Chọn --</option>
                                <option value="GS">Giáo sư (GS)</option>
                                <option value="PGS">Phó Giáo sư (PGS)</option>
                                <option value="TS">Tiến sĩ (TS)</option>
                                <option value="ThS">Thạc sĩ (ThS)</option>
                            </select>
                        </div>

                        <div class="col-12 d-grid">
                            <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
